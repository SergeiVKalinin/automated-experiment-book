name: Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install book dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Add hide-input tags to notebook code cells
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          notebook_paths = list(Path("chapters").glob("*.ipynb"))

          for path in notebook_paths:
              nb = json.loads(path.read_text(encoding="utf-8"))

              changed = False
              for cell in nb.get("cells", []):
                  if cell.get("cell_type") == "code":
                      metadata = cell.setdefault("metadata", {})
                      tags = metadata.setdefault("tags", [])

                      if "hide-input" not in tags:
                          tags.append("hide-input")
                          changed = True

                  # Keep links/title markdown cells untouched.

              if changed:
                  path.write_text(
                      json.dumps(nb, indent=1, ensure_ascii=False),
                      encoding="utf-8",
                  )
                  print(f"Added hide-input tags to {path}")
          PY

      - name: Build static HTML
        run: |
          jupyter book build --html
          
      - name: Add .nojekyll
        run: |
          touch _build/html/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
